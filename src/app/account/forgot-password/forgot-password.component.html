<div class="container">
    <div class="main-layout">
  
      <!-- LEFT: Image side -->
      <div class="image-side">
        <a class="back-button" href mat-icon-button routerLink="/account/login">
          <mat-icon>arrow_back</mat-icon>
        </a>
      </div>
  
      <!-- RIGHT: Form side -->
      <div class="login-side">
  
        <!-- Mobile back button -->
        <a class="back-button-mobile" href mat-icon-button routerLink="/account/login">
          <mat-icon>arrow_back</mat-icon>
        </a>
  
        <div class="login-logo">
          <img width="40" alt="Logo" src="../assets/icon2.png"/>
        </div>
  
        <app-card>
          <!-- Icon -->
          <div class="lock-icon-wrapper">
            <div class="lock-icon">
              <mat-icon>lock_reset</mat-icon>
            </div>
          </div>
  
          <h1 class="card-title">Forgot Password</h1>
          <p class="card-description">Enter your email and we'll send you reset instructions</p>
  
          <div class="card-body">
            <form [formGroup]="form" (ngSubmit)="onSubmit()">
  
              <mat-form-field appearance="fill">
                <mat-label>Email</mat-label>
                <input matInput type="text" formControlName="email"
                  [ngClass]="{ 'is-invalid': submitted && f.email.errors }" />
                <mat-icon matSuffix>mail_outline</mat-icon>
                <mat-error *ngIf="submitted && f.email.errors">
                  <div *ngIf="f.email.errors.required">Email is required</div>
                  <div *ngIf="f.email.errors.email">Email is invalid</div>
                </mat-error>
              </mat-form-field>
  
              <div class="button-container">
                <button mat-raised-button color="primary" [disabled]="loading">
                  <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
                  Send Reset Link
                </button>
              </div>
  
              <div class="divider">
                <span>Remembered It?</span>
              </div>
  
              <a href mat-stroked-button routerLink="/account/login" class="back-to-login">
                Back to Login
              </a>
  
            </form>
          </div>
        </app-card>
      </div>
  
    </div>
  </div>
