        <h1 class="card-title">Login in with email</h1>
        <p class="card-description">Enter your credentials to access your account</p>

        <div class="card-body">
          <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <mat-form-field appearance="fill">
              <mat-label>Email</mat-label>
              <input matInput type="text" formControlName="email"
                [ngClass]="{ 'is-invalid': submitted && f.email.errors }" />
              <mat-error *ngIf="submitted && f.email.errors">
                <div *ngIf="f.email.errors.required">Email is required</div>
                <div *ngIf="f.email.errors.email" class="warning-message">Email is invalid</div>
              </mat-error>
            </mat-form-field>
            
            <mat-form-field appearance="fill">
              <mat-label>Password</mat-label>
              <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password"
                [ngClass]="{ 'is-invalid': submitted && f.password.errors }"
                (focus)="isPasswordFocused = true"
                (blur)="isPasswordFocused = false" />
              <mat-icon matSuffix (click)="togglePassword()">
                {{ hidePassword ? 'visibility_off' : 'visibility' }}
              </mat-icon>
              <mat-error *ngIf="submitted && f.password.errors">
                <div *ngIf="f.password.errors.required">Password is required</div>
              </mat-error>
            </mat-form-field>

            <div class="forgot-password-container">
              <a mat-stroked-button (click)="goToForgot()" class="forgot-link">Forgot Password?</a>
            </div>
            
            <div class="button-container">
              <button mat-raised-button color="primary" [disabled]="submitting">
                <span *ngIf="submitting"></span>
                Login
              </button>
            </div>

            <div class="divider">
              <span>or sign up with</span>
            </div>

            <a mat-stroked-button (click)="goToRegister()" class="register-button">
              Register
            </a>
          </form>
        </div>
      </app-card>
    </div>

</div>
